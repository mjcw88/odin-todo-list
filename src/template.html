<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project: Todo List | The Odin Project</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="dropdown-container">
        <label class="dropdown-menu">
            <input type="checkbox">
        </label>
        <aside class="sidebar">
            <ul class="sidebar-list">
                <li class="create-new-container">
                    <button id="open-new-form-btn">Create New</button>
                    <div class="create-new-form-container">
                        <dialog id="create-new-form">
                            <div class="create-new-container">
                                <div class="create-new-header">
                                    <h1>Create New</h1>
                                </div>
                                <div class="create-new-main-body">
                                    <div class="create-new-sidebar">
                                        <button id="todo-form-btn">ToDo</button>
                                        <button id="project-form-btn">Project</button>
                                    </div>
                                    <form>
                                    <div class="form-row">
                                        <input type="text" id="title" name="title" maxlength="50" placeholder="Title" required>
                                    </div>
                                    <div class="form-row">

                                        <textarea id="description" name="description" maxlength="5000" placeholder="Description"></textarea>
                                    </div>
                                    <div class="form-row">
                                        <div class="priority-row">
                                            <label for="priority">Priority</label>
                                            <div>
                                                <div>
                                                    <input type="radio" id="low-priority" name="priority" value="0">
                                                    <label for="low-priority">Low</label>
                                                </div>
                                                <div>
                                                    <input type="radio" id="medium-priority" name="priority" value="1" checked>
                                                    <label for="medium-priority">Medium</label>
                                                </div>
                                                <div>
                                                    <input type="radio" id="high-priority" name="priority" value="2">
                                                    <label for="high-priority">High</label>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="date-row">
                                            <label for="date">Date</label>
                                            <input type="date" id="date" name="date" required>
                                        </div>
                                    </div>
                                    <div class="form-row">
                                        <button type="button" id="close-form-btn">Cancel</button>
                                        <button type="submit" id="add-task-btn">Add Task</button>
                                    </div>
                                    </form>
                                </div>
                            </div>
                        </dialog>
                    </div>
                </li>
                <li>
                    <button id="home-btn">Home</button>
                </li>
                <li>
                    <button id="today-btn">Today</button>
                </li>
                <li>
                    <button id="upcoming-btn">Upcoming</button>
                </li>
                <li>Projects</li>
                <li>
                    <button id="project-1-btn">Project 1</button>
                </li>
                <li>
                    <button id="project-2-btn">Project 2</button>
                </li>
                <li>
                    <button id="project-3-btn">Project 3</button>
                </li>
            </ul>
        </aside>
    </div>
    <header>
        <div class="header-container">
            <h1>ToDo List</h1>
        </div>
    </header>
    <div class="main-body-container">
        <div id="contents">
            <div class="todo-list-header">Placeholder Title</div>
            <ul class="todo-list-container">
                <li class="todo-container">
                    <div class="todo-container-left">
                        <div>ToDo Title</div>
                        <div>Project Title</div>
                    </div>
                    <div class="todo-container-right">
                        <div>Date</div>
                        <div>Edit</div>
                        <div>Delete</div>
                    </div>
                </li>
                <li class="todo-container">
                    <div class="todo-container-left">
                        <div>ToDo Title</div>
                        <div>Project Title</div>
                    </div>
                    <div class="todo-container-right">
                        <div>Date</div>
                        <div>Edit</div>
                        <div>Delete</div>
                    </div>
                </li>
                <li class="todo-container">
                    <div class="todo-container-left">
                        <div>ToDo Title</div>
                        <div>Project Title</div>
                    </div>
                    <div class="todo-container-right">
                        <div>Date</div>
                        <div>Edit</div>
                        <div>Delete</div>
                    </div>
                </li>
            </ul>
        </div>
    </div>
</body>
</html>
